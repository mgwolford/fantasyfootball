# GitHub Pages: single deploy job (matches Vite docs). Split build/deploy can fail artifact handoff.
# Site URL: https://<user>.github.io/fantasyfootball/  (must include repo name — /user.github.io/ alone is 404)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Verify built HTML (not dev template)
        run: |
          if grep -Fq 'main.jsx' dist/index.html; then
            echo "::error::dist/index.html still references main.jsx — build output looks wrong"
            exit 1
          fi

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v5
